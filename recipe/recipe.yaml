context:
  name: docling-core
  version: 2.77.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/docling_core-${{ version }}.tar.gz
  sha256: d93c7cdc0de4bbf36ef74fb4c3c3d49bb8420ff27201f3b66908672326835b47

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - validate = docling_core.utils.validate:main
      - generate_jsonschema = docling_core.utils.generate_jsonschema:main
      - generate_docs = docling_core.utils.generate_docs:main
      - docling-view = docling_core.cli.view:app

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }}
    - jsonschema >=4.16.0,<5.0.0
    - pydantic >=2.6.0,<3.0.0,!=2.10.0,!=2.10.1,!=2.10.2
    - jsonref >=1.1.0,<2.0.0
    - tabulate >=0.9.0,<0.11.0
    - pandas >=2.1.4,<4.0.0
    - pillow >=10.0.0,<13.0.0
    - pyyaml >=5.1,<7.0.0
    - typer >=0.12.5,<0.25.0
    - latex2mathml >=3.77.0,<4.0.0
    - defusedxml >=0.7.1,<0.8.0
    - typing_extensions >=4.12.2,<5.0.0
    - pydantic-settings >=2.14.0
tests:
  - python:
      imports:
        - docling_core
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - validate --help
      - generate_jsonschema --help
      - generate_docs --help
      - docling-view --help
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  summary: A python library to define and validate data types in Docling.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/docling-project/docling-core

extra:
  recipe-maintainers:
    - kklein
